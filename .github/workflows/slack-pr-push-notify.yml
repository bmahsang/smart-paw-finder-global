name: Slack PR Push Notify

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-push-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ !contains(fromJSON('["bmahsang", "bmhayoung"]'), github.event.pull_request.user.login) }}
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
        run: |
          REPO="${{ github.event.repository.name }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          MESSAGE="🔄 ${REPO} / ${BRANCH}
          변경 내역:
          • #${PR_NUMBER} ${PR_TITLE} (@${PR_AUTHOR})

          🔗 ${PR_URL}"

          PAYLOAD=$(jq -n --arg text "$MESSAGE" '{text: $text}')
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
